name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    env:
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate release tag and runner
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(uname -m)" = "$ARCH"

      - name: Run core checks
        run: make test

      - name: Build release DMG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" make dmg

      - name: Generate signed appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          UPDATES=".build/updates-${ARCH}"
          rm -rf "$UPDATES"
          mkdir -p "$UPDATES"
          cp "dist/PastePilot-${GITHUB_REF_NAME#v}-${ARCH}.dmg" "$UPDATES/"
          TOOL="$(find ".build/${ARCH}/artifacts" -type f -name generate_appcast -print -quit)"
          test -x "$TOOL"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$TOOL" \
            --ed-key-file - \
            --download-url-prefix \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            -o "${GITHUB_WORKSPACE}/dist/appcast-${ARCH}.xml" \
            "$UPDATES"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: PastePilot-macos-${{ matrix.arch }}
          path: |
            dist/PastePilot-*-${{ matrix.arch }}.dmg
            dist/appcast-${{ matrix.arch }}.xml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PastePilot-macos-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          test "$(find dist -maxdepth 1 -name '*.dmg' | wc -l)" -eq 2
          test "$(find dist -maxdepth 1 -name 'appcast-*.xml' | wc -l)" -eq 2
          cd dist
          sha256sum *.dmg > SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.dmg \
            dist/appcast-*.xml \
            dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "PastePilot $GITHUB_REF_NAME"
