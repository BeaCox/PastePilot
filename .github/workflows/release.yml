name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    env:
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate release tag and runner
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(uname -m)" = "$ARCH"
          xcode-select -p
          xcodebuild -version
          swift --version
          find /Applications /Library/Developer/CommandLineTools -path '*Testing.framework' -maxdepth 8 -print 2>/dev/null || true

      - name: Run core checks
        run: make test

      - name: Build release DMG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" make dmg

      - name: Generate signed appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          VERSION="${GITHUB_REF_NAME#v}"
          UPDATES=".build/updates-${ARCH}"
          rm -rf "$UPDATES"
          mkdir -p "$UPDATES"
          cp "dist/PastePilot-${VERSION}-${ARCH}.dmg" "$UPDATES/"
          # A release-notes .html named after the archive is embedded by
          # generate_appcast into the appcast <description>, so the Sparkle
          # updater UI shows this version's changes when an update is offered.
          NOTES_HTML="$UPDATES/PastePilot-${VERSION}-${ARCH}.html"
          if python3 Scripts/changelog-to-html.py "$VERSION" > "$NOTES_HTML"; then
            echo "Embedded release notes for $VERSION into the appcast."
          else
            rm -f "$NOTES_HTML"
            echo "No CHANGELOG section for $VERSION; appcast will omit release notes."
          fi
          TOOL="$(find ".build/${ARCH}/artifacts" -type f -name generate_appcast -print -quit)"
          test -x "$TOOL"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$TOOL" \
            --ed-key-file - \
            --download-url-prefix \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            -o "${GITHUB_WORKSPACE}/dist/appcast-${ARCH}.xml" \
            "$UPDATES"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: PastePilot-macos-${{ matrix.arch }}
          path: |
            dist/PastePilot-*-${{ matrix.arch }}.dmg
            dist/appcast-${{ matrix.arch }}.xml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Print the body of the matching "## [VERSION]" section, with leading
          # and trailing blank lines trimmed.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/      { exit }
            capture {
              if (!started && $0 ~ /[^[:space:]]/) started = 1
              if (started) { lines[n++] = $0 }
            }
            END {
              last = n - 1
              while (last >= 0 && lines[last] ~ /^[[:space:]]*$/) last--
              for (i = 0; i <= last; i++) print lines[i]
            }
          ' CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog section found for $VERSION; falling back to generated notes."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PastePilot-macos-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          test "$(find dist -maxdepth 1 -name '*.dmg' | wc -l)" -eq 2
          test "$(find dist -maxdepth 1 -name 'appcast-*.xml' | wc -l)" -eq 2
          cd dist
          sha256sum *.dmg > SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES_FOUND: ${{ steps.changelog.outputs.found }}
        run: |
          if [ "$NOTES_FOUND" = "true" ]; then
            NOTES_ARG=(--notes-file release-notes.md)
          else
            NOTES_ARG=(--generate-notes)
          fi
          gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" \
            dist/*.dmg \
            dist/appcast-*.xml \
            dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            "${NOTES_ARG[@]}" \
            --title "PastePilot $GITHUB_REF_NAME"
