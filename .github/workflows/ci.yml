name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    env:
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show toolchain versions
        run: |
          uname -m
          test "$(uname -m)" = "$ARCH"
          xcode-select -p
          xcodebuild -version
          swift --version
          find /Applications /Library/Developer/CommandLineTools -path '*Testing.framework' -maxdepth 8 -print 2>/dev/null || true

      - name: Build debug executable
        run: make build

      - name: Run core checks
        run: make test

      - name: Build app bundle
        run: make app

      - name: Verify app bundle
        run: |
          APP="dist/PastePilot-${ARCH}.app"
          test -x "$APP/Contents/MacOS/PastePilot"
          lipo "$APP/Contents/MacOS/PastePilot" -verify_arch "$ARCH"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG
        if: github.event_name != 'pull_request'
        run: make dmg

      - name: Upload DMG artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: PastePilot-macos-${{ matrix.arch }}-${{ github.sha }}
          path: dist/PastePilot-*-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 7
