name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build debug executable
        run: make build

      - name: Run core checks
        run: make test

      - name: Build app bundle
        run: make app

      - name: Verify app bundle
        run: |
          test -x dist/PastePilot.app/Contents/MacOS/PastePilot
          lipo dist/PastePilot.app/Contents/MacOS/PastePilot -verify_arch arm64 x86_64
          codesign --verify --deep --strict --verbose=2 dist/PastePilot.app

      - name: Package app artifact
        if: github.event_name != 'pull_request'
        run: tar -czf PastePilot-macos-universal.tar.gz -C dist PastePilot.app

      - name: Upload app artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: PastePilot-macos-universal-${{ github.sha }}
          path: PastePilot-macos-universal.tar.gz
          if-no-files-found: error
          retention-days: 7
